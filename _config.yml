title: "Florens' Blog"
author: "Florens"
description: A place for me to talk about what is on my mind or collect things I like. Blog template by <a href="https://www.w3schools.com/">Visit W3Schools.com!</a>Chad Baldwin. # This will show up in places like twitter, linkedin, etc, if you share your sites url as a post.

# Email / Social media user names used by the minima theme:
# All of these are optional and can be removed or commented out
#email: "example@mail.com"
#twitter_username: "twitteruser"
github_username: "mtlstylebagel"
#linkedin_username: "linkedinuser"
#facebook_username: username
#flickr_username: username
instagram_username: "mtlstylebagel"
#pinterest_username: username
#youtube_username: username
#googleplus_username: +username

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
theme: "minima"

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other
